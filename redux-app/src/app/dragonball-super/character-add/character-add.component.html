<h3>Agregar:</h3>
<input 
    #textName
    type="text" 
    class="form-control" 
    placeholder="Nombre"
    [value]="name()"
    (input)="name.set(textName.value)"
/>
<input 
    #textPower
    type="number" 
    class="form-control mt-2" 
    placeholder="Poder"
    [value]="power()"
    (input)="power.set(+textPower.value)"
/>

<button (click)="addCharacter()" class="btn btn-primary mt-2">Agregar</button>
